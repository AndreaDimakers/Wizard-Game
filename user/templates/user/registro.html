{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #ccc;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 2px #6c63ff;
        }

        input::placeholder {
            color: #888;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #6c63ff 0%, #4a45b2 100%);
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(108, 99, 255, 0.4);
        }

        .messages {
            margin-bottom: 20px;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: center;
        }

        .message.error {
            background: rgba(255, 82, 82, 0.2);
            color: #ff5252;
            border: 1px solid rgba(255, 82, 82, 0.3);
        }

        .message.success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #ccc;
        }

        .login-link a {
            color: #6c63ff;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* ==================== AVATAR GRID ==================== */
        .avatar-section-title {
            color: #ccc;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 10px;
        }

        .avatar-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
        }

        .avatar-card:hover {
            border-color: #6c63ff;
            transform: scale(1.05);
            background: rgba(108, 99, 255, 0.1);
        }

        .avatar-card.selected {
            border-color: #6c63ff;
            background: rgba(108, 99, 255, 0.2);
            box-shadow: 0 0 20px rgba(108, 99, 255, 0.4);
        }

        .avatar-card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 10px;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.2);
            transition: border-color 0.3s ease;
        }

        .avatar-card.selected img {
            border-color: #6c63ff;
        }

        .avatar-card span {
            font-size: 0.85rem;
            color: #ccc;
            font-weight: 500;
        }

        .avatar-card.selected span {
            color: #fff;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (min-width: 480px) {
            .avatar-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>🧙‍♂️ Crear Cuenta</h1>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Usuario</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Ingresa tu usuario"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Ingresa tu contraseña"
                    required
                >
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirmar Contraseña</label>
                <input 
                    type="password" 
                    id="confirm_password" 
                    name="confirm_password" 
                    placeholder="Confirma tu contraseña"
                    required
                >
            </div>

            <div class="form-group">
                <label class="avatar-section-title">Elige tu Avatar</label>
                <div class="avatar-grid">
                    {% for value, label in avatars %}
                    <div class="avatar-card" onclick="selectAvatar(this, '{{ value }}')">
                        <img src="{% static 'user/avatars/' %}{{ value }}.jpg" alt="{{ label }}">
                        <span>{{ label }}</span>
                    </div>
                    {% endfor %}
                </div>
                <input type="hidden" name="avatar" id="selected-avatar" value="">
            </div>

            <button type="submit" class="btn-register">
                Registrarse ✨
            </button>
        </form>

        <p class="login-link">
            ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión aquí</a>
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const firstCard = document.querySelector('.avatar-card');
            if (firstCard) {
                firstCard.classList.add('selected');
                
                const firstValue = firstCard.querySelector('span').textContent;
                document.getElementById('selected-avatar').value = '{{ avatars.0.0 }}';
            }
        });

        function selectAvatar(card, value) {
            
            document.querySelectorAll('.avatar-card').forEach(c => {
                c.classList.remove('selected');
            });

            
            card.classList.add('selected');

            
            document.getElementById('selected-avatar').value = value;
        }
    </script>
</body>
</html>
